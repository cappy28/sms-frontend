<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMS Gateway</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #1a1a1f;
      --surface2: #242429;
      --border: #2e2e36;
      --accent: #5cff8a;
      --accent-dim: rgba(92,255,138,0.12);
      --text: #e8e8ee;
      --muted: #6b6b7a;
      --danger: #ff5c5c;
      --outgoing: #1e3a2f;
      --incoming: #1e1e28;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .status-badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(92,255,138,0.25);
    }

    /* LAYOUT */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .conversations {
      flex: 1;
      overflow-y: auto;
    }

    .conversations::-webkit-scrollbar { width: 4px; }
    .conversations::-webkit-scrollbar-track { background: transparent; }
    .conversations::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .conv-item {
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(46,46,54,0.5);
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .conv-item:hover { background: var(--surface2); }
    .conv-item.active { background: var(--accent-dim); border-left: 2px solid var(--accent); }

    .conv-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .conv-info { flex: 1; min-width: 0; }

    .conv-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-preview {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .conv-unread {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* CHAT AREA */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }

    .chat-contact {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      border: 1px solid rgba(92,255,138,0.3);
    }

    .chat-name { font-weight: 600; font-size: 14px; }
    .chat-number { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 65%;
    }

    .msg-row.outgoing { align-self: flex-end; align-items: flex-end; }
    .msg-row.incoming { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .outgoing .bubble {
      background: var(--outgoing);
      border: 1px solid rgba(92,255,138,0.2);
      border-bottom-right-radius: 4px;
    }

    .incoming .bubble {
      background: var(--incoming);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'DM Mono', monospace;
    }

    .msg-status {
      font-size: 11px;
      color: var(--accent);
      margin-top: 2px;
    }

    /* EMPTY STATE */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
    }

    .empty-icon { font-size: 48px; opacity: 0.3; }
    .empty-text { font-size: 14px; }

    /* NEW CONVERSATION */
    .new-conv-btn {
      margin: 12px;
      padding: 10px;
      background: var(--accent-dim);
      border: 1px solid rgba(92,255,138,0.25);
      border-radius: 8px;
      color: var(--accent);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .new-conv-btn:hover { background: rgba(92,255,138,0.2); }

    /* INPUT AREA */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 44px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: rgba(92,255,138,0.4); }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      color: #0e0e10;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover { transform: scale(1.05); background: #7affaa; }
    .send-btn:active { transform: scale(0.97); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 600;
    }

    .modal input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }

    .modal input:focus { border-color: rgba(92,255,138,0.4); }
    .modal input::placeholder { color: var(--muted); }

    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

    .btn-cancel {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-start {
      padding: 8px 16px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0e0e10;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    /* CONFIG PANEL */
    .config-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
    }

    .config-btn:hover { color: var(--text); border-color: var(--text); }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success { border-color: rgba(92,255,138,0.4); color: var(--accent); }
    .toast.error { border-color: rgba(255,92,92,0.4); color: var(--danger); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    SMS GATEWAY
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <span class="status-badge" id="statusBadge">⬤ Connecté</span>
    <button class="config-btn" onclick="openConfig()">⚙ Config</button>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">Conversations</div>
    <div class="conversations" id="convList"></div>
    <button class="new-conv-btn" onclick="openNewConv()">
      + Nouvelle conversation
    </button>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="chat-contact">
        <div class="chat-avatar" id="chatAvatar">?</div>
        <div>
          <div class="chat-name" id="chatName">—</div>
          <div class="chat-number" id="chatNumber">—</div>
        </div>
      </div>
    </div>

    <div class="messages" id="msgArea">
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-text">Sélectionne une conversation</div>
      </div>
    </div>

    <div class="input-area" id="inputArea" style="display:none">
      <textarea id="msgInput" placeholder="Écris ton message..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- MODAL nouvelle conv -->
<div class="modal-overlay" id="newConvModal">
  <div class="modal">
    <h3>Nouvelle conversation</h3>
    <input type="tel" id="newNumber" placeholder="Numéro (ex: +33612345678)" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeNewConv()">Annuler</button>
      <button class="btn-start" onclick="startConv()">Démarrer</button>
    </div>
  </div>
</div>

<!-- MODAL config -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h3>⚙ Configuration</h3>
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px">URL du backend Railway</div>
    <input type="text" id="backendUrl" placeholder="https://ton-backend.up.railway.app" />
    <div style="font-size:11px;color:var(--muted)">Cette URL sera fournie après déploiement sur Railway.</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeConfig()">Annuler</button>
      <button class="btn-start" onclick="saveConfig()">Sauvegarder</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  let BACKEND = localStorage.getItem('sms_backend') || '';
  let conversations = {}; // { number: [messages] }
  let activeContact = null;
  let pollInterval = null;

  // ─── INIT ────────────────────────────────────────────────────────────────────
  function init() {
    if (BACKEND) {
      startPolling();
    } else {
      document.getElementById('statusBadge').textContent = '⚠ Non configuré';
      document.getElementById('statusBadge').style.color = '#ffaa5c';
      setTimeout(() => openConfig(), 500);
    }
  }

  // ─── POLLING ─────────────────────────────────────────────────────────────────
  function startPolling() {
    fetchMessages();
    clearInterval(pollInterval);
    pollInterval = setInterval(fetchMessages, 3000);
  }

  async function fetchMessages() {
    if (!BACKEND) return;
    try {
      const res = await fetch(`${BACKEND}/messages`);
      const msgs = await res.json();
      processMessages(msgs);
      document.getElementById('statusBadge').textContent = '⬤ Connecté';
      document.getElementById('statusBadge').style.color = '';
    } catch (e) {
      document.getElementById('statusBadge').textContent = '✕ Déconnecté';
      document.getElementById('statusBadge').style.color = '#ff5c5c';
    }
  }

  function processMessages(msgs) {
    const newConvs = {};
    msgs.forEach(msg => {
      const contact = msg.direction === 'incoming' ? msg.from : msg.to;
      if (!newConvs[contact]) newConvs[contact] = [];
      newConvs[contact].push(msg);
    });
    conversations = newConvs;
    renderConversations();
    if (activeContact) renderMessages(activeContact);
  }

  // ─── RENDER CONVERSATIONS ────────────────────────────────────────────────────
  function renderConversations() {
    const list = document.getElementById('convList');
    list.innerHTML = '';

    if (Object.keys(conversations).length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted)">Aucune conversation</div>';
      return;
    }

    Object.entries(conversations).forEach(([contact, msgs]) => {
      const last = msgs[msgs.length - 1];
      const unread = msgs.some(m => !m.read && m.direction === 'incoming');
      const initials = contact.replace(/\D/g,'').slice(-2) || '??';

      const div = document.createElement('div');
      div.className = `conv-item${activeContact === contact ? ' active' : ''}`;
      div.onclick = () => selectContact(contact);
      div.innerHTML = `
        <div class="conv-avatar">${initials}</div>
        <div class="conv-info">
          <div class="conv-name">${contact}</div>
          <div class="conv-preview">${last ? last.message.substring(0,40) : ''}</div>
        </div>
        ${unread ? '<div class="conv-unread"></div>' : ''}
      `;
      list.appendChild(div);
    });
  }

  // ─── SELECT CONTACT ──────────────────────────────────────────────────────────
  function selectContact(contact) {
    activeContact = contact;
    const initials = contact.replace(/\D/g,'').slice(-2) || '??';

    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('inputArea').style.display = 'flex';
    document.getElementById('chatAvatar').textContent = initials;
    document.getElementById('chatName').textContent = contact;
    document.getElementById('chatNumber').textContent = contact;

    renderMessages(contact);
    renderConversations();

    // Marquer comme lu
    if (conversations[contact]) {
      conversations[contact].forEach(async msg => {
        if (!msg.read && msg.direction === 'incoming' && BACKEND) {
          await fetch(`${BACKEND}/messages/${msg.id}/read`, { method: 'PATCH' });
        }
      });
    }
  }

  // ─── RENDER MESSAGES ─────────────────────────────────────────────────────────
  function renderMessages(contact) {
    const area = document.getElementById('msgArea');
    const msgs = conversations[contact] || [];

    if (msgs.length === 0) {
      area.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-text">Aucun message</div></div>';
      return;
    }

    area.innerHTML = msgs.map(msg => {
      const dir = msg.direction === 'outgoing' ? 'outgoing' : 'incoming';
      const time = new Date(msg.timestamp).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      const status = msg.direction === 'outgoing' ? `<div class="msg-status">${msg.status === 'sent' ? '✓ Envoyé' : '⏳ En attente'}</div>` : '';
      return `
        <div class="msg-row ${dir}">
          <div class="bubble">${escapeHtml(msg.message)}</div>
          <div class="msg-time">${time}</div>
          ${status}
        </div>
      `;
    }).join('');

    area.scrollTop = area.scrollHeight;
  }

  // ─── SEND MESSAGE ────────────────────────────────────────────────────────────
  async function sendMessage() {
    if (!activeContact || !BACKEND) return;
    const input = document.getElementById('msgInput');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    input.style.height = 'auto';

    try {
      const res = await fetch(`${BACKEND}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: activeContact, message })
      });

      if (res.ok) {
        showToast('Message envoyé !', 'success');
        fetchMessages();
      } else {
        showToast('Erreur d\'envoi', 'error');
      }
    } catch (e) {
      showToast('Impossible de contacter le serveur', 'error');
    }
  }

  // ─── NEW CONV ────────────────────────────────────────────────────────────────
  function openNewConv() { document.getElementById('newConvModal').classList.add('open'); }
  function closeNewConv() { document.getElementById('newConvModal').classList.remove('open'); }

  function startConv() {
    const num = document.getElementById('newNumber').value.trim();
    if (!num) return;
    closeNewConv();
    if (!conversations[num]) conversations[num] = [];
    selectContact(num);
    renderConversations();
  }

  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  function openConfig() {
    document.getElementById('backendUrl').value = BACKEND;
    document.getElementById('configModal').classList.add('open');
  }

  function closeConfig() { document.getElementById('configModal').classList.remove('open'); }

  function saveConfig() {
    BACKEND = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
    localStorage.setItem('sms_backend', BACKEND);
    closeConfig();
    showToast('Configuration sauvegardée !', 'success');
    startPolling();
  }

  // ─── UTILS ───────────────────────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  init();
</script>
</body>
</html>
